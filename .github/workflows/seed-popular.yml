name: Seed popular repos

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      daily_limit:
        description: 'Embeddings to generate this run'
        required: false
        default: '1000'
      tool_enrich_limit:
        description: 'Repos to inspect for tool intelligence'
        required: false
        default: '250'

concurrency:
  group: seed-popular
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Run seed script
        run: pnpm db:seed-popular
        env:
          # The runner token has enough GitHub Search quota for the daily walk.
          # Keep this independent of long-lived PAT rotation so a stale secret
          # cannot break scheduled seeding with 401 Bad credentials.
          GITHUB_TOKEN: ${{ github.token }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          SEED_DAILY_LIMIT: ${{ github.event.inputs.daily_limit || '1000' }}
          MIN_STARS_FLOOR: '5000'

      - name: Publish refresh evidence
        if: always()
        shell: bash
        run: |
          if [[ -f data/refresh-manifest.json ]]; then
            {
              echo '### Refresh manifest'
              echo '```json'
              cat data/refresh-manifest.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo '### Refresh manifest' >> "$GITHUB_STEP_SUMMARY"
            echo 'No manifest was produced; refresh evidence is missing.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enrich tool intelligence
        run: pnpm db:enrich-tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TOOL_ENRICH_LIMIT: ${{ github.event.inputs.tool_enrich_limit || '250' }}
          TOOL_ENRICH_HARD_LIMIT: '750'
          TOOL_MIN_STARS: '10000'
