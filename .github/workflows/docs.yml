name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'STATUS.md'
      - 'PROJECT_STATUS.md'
      - 'README.md'
      - 'blume.config.ts'
      - 'scripts/check-docs.mjs'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'STATUS.md'
      - 'PROJECT_STATUS.md'
      - 'README.md'
      - 'blume.config.ts'
      - 'scripts/check-docs.mjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Validate docs/ links and structure
        run: node scripts/check-docs.mjs
