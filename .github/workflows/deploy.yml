name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'src/**'
      - 'public/**'
      - 'patches/**'
      - 'next.config.ts'
      - 'open-next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - 'wrangler.jsonc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # populateCache local boots an in-memory wrangler platform proxy to
      # resolve bindings; AI + the unsafe rate-limiter binding need the
      # same CF token the wrangler-action below uses, otherwise the step
      # errors with "You must be logged in to use wrangler dev in remote
      # mode."
      - run: pnpm cf:build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Smoke check production
        run: curl --fail --silent --show-error --retry 3 --retry-delay 5 --max-time 20 https://starboard.sarthakagrawal927.workers.dev/ > /dev/null
